<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>環境音の確認</title>
<style>
  body{font-family:sans-serif;max-width:420px;margin:30px auto;padding:0 16px;line-height:1.7;}
  #bar{width:100%;height:20px;background:#eee;border-radius:6px;overflow:hidden;margin:12px 0;}
  #fill{height:100%;width:0%;background:#999;transition:width .1s linear;}
  #level{font-size:22px;font-weight:bold;color:#555;}
  .note{color:#777;font-size:12px;}
</style>
</head>
<body>

<p id="permStatus" class="note">マイクへのアクセスを確認しています…</p>
<div id="bar"><div id="fill"></div></div>
<div id="level">--</div>

<p class="note">
これはWeb Audio APIによる相対音量（RMS）を仮に数値化したもので、専用の騒音計のような校正済みの絶対音圧レベルではありません。研究者が後で参考にするための記録用の数値です。
</p>

<script>
  let audioCtx, analyser, dataArray, rafId, samples = [];

  function start() {
    samples = [];
    navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
    })
      .then(stream => {
        document.getElementById('permStatus').innerText = '測定中…';

        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        source.connect(analyser);
        dataArray = new Uint8Array(analyser.fftSize);

        const startTime = performance.now();
        const WARMUP_MS = 1000; // 最初の1秒はストリームが安定するまでの区間として捨てる
        const MEASURE_MS = 3000;
        function tick() {
          analyser.getByteTimeDomainData(dataArray);
          let sumSq = 0;
          for (let i = 0; i < dataArray.length; i++) {
            const v = (dataArray[i] - 128) / 128;
            sumSq += v * v;
          }
          const rms = Math.sqrt(sumSq / dataArray.length);
          const dbLike = rms > 0 ? Math.max(0, 20 * Math.log10(rms) + 100) : 0;
          const elapsed = performance.now() - startTime;

          if (elapsed < WARMUP_MS) {
            document.getElementById('fill').style.width = Math.min(100, dbLike) + '%';
            rafId = requestAnimationFrame(tick);
          } else if (elapsed < WARMUP_MS + MEASURE_MS) {
            samples.push(dbLike);
            document.getElementById('fill').style.width = Math.min(100, dbLike) + '%';
            document.getElementById('level').innerText = dbLike.toFixed(1);
            rafId = requestAnimationFrame(tick);
          } else {
            finish(stream);
          }
        }
        tick();
      })
      .catch(err => {
        // マイクが使えない・拒否された場合は、何もせず静かにあきらめる
        // （このページ自体が補助的な記録用であり、参加者の進行には影響させないため）
        document.getElementById('permStatus').innerText = '';
        setTimeout(function () { window.close(); }, 300);
      });
  }

  function finish(stream) {
    cancelAnimationFrame(rafId);
    stream.getTracks().forEach(t => t.stop());
    audioCtx.close();
    const avg = samples.reduce((a, b) => a + b, 0) / samples.length;

    if (window.opener) {
      window.opener.postMessage({ type: 'envNoiseResult', quiet: null, value: avg }, '*');
    }
    window.close();
  }

  start();
</script>

</body>
</html>
